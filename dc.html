<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gombal</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
      color: #333;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      display: inline-block;
      max-width: 500px;
      margin-top: 100px;
      position: relative;
      z-index: 2;
    }

    h1 {
      color: #ff4b5c;
    }

    #text {
      margin-top: 20px;
      min-height: 150px;
      line-height: 1.6;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4b5c;
      color: white;
      cursor: pointer;
    }

    /* LOVE ANIMATION */
    .heart {
      position: absolute;
      top: -10px;
      color: red;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hai Mailona Yubia 💖</h1>
    <div id="text"></div>
    <button onclick="startTyping()">Klik Aku 😏</button>
  </div>

  <script>
    const message = [
      "Aku Arfan...",
      "",
      "Mungkin aku bukan yang paling sempurna,",
      "tapi kalau soal sayang kamu,",
      "aku selalu full tanpa bug 💖",
      "",
      "Kalau hati ini program,",
      "kamu itu variabel yang selalu aku butuhin...",
      "",
      "Dan jujur aja,",
      "aku ga mau ngehapus kamu dari hidup aku ❤️"
    ];

    let i = 0;
    let j = 0;

    function startTyping() {
      document.getElementById("text").innerHTML = "";
      i = 0;
      j = 0;
      type();
    }

    function type() {
      if (i < message.length) {
        if (j < message[i].length) {
          document.getElementById("text").innerHTML += message[i].charAt(j);
          j++;
          setTimeout(type, 40);
        } else {
          document.getElementById("text").innerHTML += "<br>";
          i++;
          j = 0;
          setTimeout(type, 400);
        }
      }
    }

    // CREATE FALLING HEARTS
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
